name: Path Classification Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  validate-path-classification:
    name: Validate IsOpenApiFilePath Logic
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run path classification tests
        run: |
          echo "=== IsOpenApiFilePath Classification Tests ==="
          echo ""

          # Mirrors the fixed IsOpenApiFilePath logic:
          # Only .json, .yaml, .yml (case-insensitive) are treated as files.
          # Everything else (including dot-named dirs like my.api or ben/capital.offer.created) is a directory.
          classify() {
            local path="$1"
            local filename="${path##*/}"
            local ext="${filename##*.}"
            local ext_lower=$(echo "$ext" | tr '[:upper:]' '[:lower:]')

            if [[ "$filename" == *.* ]] && [[ "$ext_lower" == "json" || "$ext_lower" == "yaml" || "$ext_lower" == "yml" ]]; then
              echo "FILE"
            else
              echo "DIRECTORY"
            fi
          }

          # Expected outcomes — update this table when .apimaticsettings.json changes
          declare -A EXPECTED
          EXPECTED["ben/capital.offer.created"]="DIRECTORY"
          EXPECTED["specs/openapi.yaml"]="FILE"
          EXPECTED["specs/openapi.yml"]="FILE"
          EXPECTED["specs/openapi.json"]="FILE"
          EXPECTED["specs/openapi.JSON"]="FILE"
          EXPECTED["my.api"]="DIRECTORY"
          EXPECTED["specs/v1"]="DIRECTORY"
          EXPECTED["my.api/spec.v2.yaml"]="FILE"

          PASS=true
          PATHS=$(jq -r '.OpenapiDefinitionPaths[]' .apimaticsettings.json)

          while IFS= read -r path; do
            actual=$(classify "$path")
            expected="${EXPECTED[$path]}"

            if [[ -z "$expected" ]]; then
              echo "SKIP  '$path' — no expectation defined (classified as $actual)"
            elif [[ "$actual" == "$expected" ]]; then
              echo "PASS  '$path' => $actual"
            else
              echo "FAIL  '$path' => expected $expected, got $actual"
              PASS=false
            fi
          done <<< "$PATHS"

          echo ""
          if [[ "$PASS" == "false" ]]; then
            echo "One or more path classification tests FAILED."
            exit 1
          fi
          echo "All path classification tests PASSED."
