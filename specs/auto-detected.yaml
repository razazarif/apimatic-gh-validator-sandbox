openapi: '3.0.0'
info:
  title: Auto-Detected API
  description: >
    No .apimaticsettings.json present.
    The APIMatic GitHub App should auto-detect this modified
    OpenAPI file and validate it without explicit configuration.
  version: '1.0.1'
servers:
  - url: https://api.example.com/v1
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
