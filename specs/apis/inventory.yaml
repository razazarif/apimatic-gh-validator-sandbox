openapi: '3.0.0'
info:
  title: Inventory API
  version: '1.0.0'
servers:
  - url: https://api.example.com/v1
paths:
  /inventory:
    get:
      operationId: listInventory
      summary: List inventory items
      responses:
        '200':
          description: A list of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
components:
  schemas:
    Item:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
