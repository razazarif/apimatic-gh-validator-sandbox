openapi: "3.0.0"
info:
  title: "Capital Offer API"
  version: "1.0.0"
paths:
  /offers:
    get:
      summary: "List capital offers"
      responses:
        "200":
          description: "Success"
  /offers/{id}:
    get:
      summary: "Get a capital offer by ID"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "Success"
        "404":
          description: "Not found"